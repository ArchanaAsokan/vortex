name: Vortex
options:
  bundleIdPrefix: com.archasok
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  Vortex:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources/Vortex
    info:
      path: Vortex/Info.plist
      properties:
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "© 2026 archasok"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.archasok.vortex
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_STRICT_CONCURRENCY: minimal
